[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# Exclude deploy scripts — they require live RPC and are not unit-testable
no_match_coverage = "script/"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# ─── RPC endpoints ────────────────────────────────────────────────────────────
[rpc_endpoints]
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
arbitrum_one     = "https://arb1.arbitrum.io/rpc"
# Robinhood Chain Testnet — Chain ID: 46630 | Arbitrum Orbit L2
# Public RPC (rate-limited): https://rpc.testnet.chain.robinhood.com
# Recommended (Alchemy): https://robinhood-testnet.g.alchemy.com/v2/<YOUR_API_KEY>
robinhood_testnet = "${ROBINHOOD_RPC_URL}"

# ─── Etherscan / block explorer verification ──────────────────────────────────
[etherscan]
arbitrum_sepolia  = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }
arbitrum_one      = { key = "${ETHERSCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
# Robinhood Chain explorer — explorer.testnet.chain.robinhood.com (no API key needed for testnet)
robinhood_testnet = { key = "placeholder", url = "https://explorer.testnet.chain.robinhood.com/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
